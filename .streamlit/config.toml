[client]
showErrorDetails = true
toolbarMode = "viewer"

[server]
headless = true
port = 8501
enableXsrfProtection = true
enableCORS = true
maxUploadSize = 200

[logger]
level = "info"

[theme]
primaryColor = "#FF5733"
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#F0F2F6"
textColor = "#262730"
font = "sans serif"
